<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Senhas</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f0f0f0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:20px;
    border-radius:10px;
    width:320px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input, button{
    width:100%;
    padding:10px;
    margin-top:10px;
    box-sizing:border-box;
}

#senha{
    font-weight:bold;
    text-align:center;
}
</style>
</head>
<body>

<div class="container">
    <h2>🔐 Gerador de Senhas</h2>

    <input type="text" id="senha" readonly placeholder="Sua senha aparecerá aqui">

    <button onclick="gerarSenha()">
        🔑 Gerar Senha Forte
    </button>

    <button onclick="copiarSenha()">
        📋 Copiar Senha
    </button>

    <p id="forca"></p>
</div>

<script>
function gerarSenha() {

    const caracteres =
    "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%&*";

    let senha = "";

    for(let i = 0; i < 12; i++){
        senha += caracteres.charAt(
            Math.floor(Math.random() * caracteres.length)
        );
    }

    document.getElementById("senha").value = senha;
    document.getElementById("forca").innerText =
    "🟢 Senha Forte";
}

function copiarSenha() {

    const campo = document.getElementById("senha");

    campo.select();
    campo.setSelectionRange(0, 99999);

    navigator.clipboard.writeText(campo.value);

    alert("Senha copiada!");
}
</script>

</body>
</html>
