<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Cadastro e Login</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:25px;
    border-radius:10px;
    width:320px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,button{
    width:100%;
    padding:10px;
    margin-top:10px;
    box-sizing:border-box;
}

button{
    cursor:pointer;
}

h2{
    text-align:center;
}

#painel{
    display:none;
}
</style>
</head>

<body>

<div class="box" id="cadastro">

<h2>📝 Cadastro</h2>

<input type="text" id="novoUsuario" placeholder="Usuário">

<input type="password" id="novaSenha" placeholder="Senha">

<button onclick="gerarSenha()">
🔐 Gerar Senha Forte
</button>

<button onclick="cadastrar()">
Cadastrar
</button>

<p id="msgCadastro"></p>

</div>

<div class="box" id="login" style="display:none">

<h2>🔑 Login</h2>

<input type="text" id="usuario" placeholder="Usuário">

<input type="password" id="senha" placeholder="Senha">

<button onclick="entrar()">
Entrar
</button>

<p id="msgLogin"></p>

</div>

<div class="box" id="painel">

<h2>🎉 Painel Principal</h2>

<p>Login realizado com sucesso!</p>

<button onclick="sair()">
Sair
</button>

</div>

<script>

function gerarSenha(){

const caracteres =
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%&*";

let senha = "";

for(let i=0;i<12;i++){

senha += caracteres.charAt(
Math.floor(Math.random()*caracteres.length)
);

}

document.getElementById("novaSenha").value = senha;

}

function cadastrar(){

const usuario =
document.getElementById("novoUsuario").value;

const senha =
document.getElementById("novaSenha").value;

localStorage.setItem("usuario",usuario);
localStorage.setItem("senha",senha);

document.getElementById("msgCadastro").innerText =
"✅ Cadastro realizado!";

setTimeout(()=>{

document.getElementById("cadastro").style.display="none";
document.getElementById("login").style.display="block";

},1000);

}

function entrar(){

const usuario =
document.getElementById("usuario").value;

const senha =
document.getElementById("senha").value;

if(
usuario === localStorage.getItem("usuario")
&&
senha === localStorage.getItem("senha")
){

document.getElementById("login").style.display="none";
document.getElementById("painel").style.display="block";

}else{

document.getElementById("msgLogin").innerText =
"❌ Usuário ou senha incorretos";

}

}

function sair(){

document.getElementById("painel").style.display="none";
document.getElementById("login").style.display="block";

}

</script>

</body>
</html>
